<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-labelledby="title desc">
  <title id="title">Чертеж 2. График для определения укрывистости</title>
  <desc id="desc">График зависимости коэффициента контрастности от массы покрытия для определения укрывистости.</desc>
  <rect width="260" height="260" fill="#fffdf8"/>
  <g fill="none" stroke="#444" stroke-width="2">
    <line x1="35" y1="20" x2="35" y2="210"/>
    <line x1="35" y1="210" x2="230" y2="210"/>
    <line x1="35" y1="185" x2="230" y2="185" stroke="#8c8c8c"/>
    <line x1="35" y1="140" x2="230" y2="140" stroke="#8c8c8c"/>
    <line x1="35" y1="52" x2="230" y2="52" stroke="#8c8c8c" stroke-dasharray="6 4"/>
    <line x1="145" y1="30" x2="145" y2="210" stroke="#8c8c8c" stroke-dasharray="6 4"/>
    <path d="M40 200 C55 90, 100 45, 230 40" stroke="#8a8a8a" stroke-width="3" fill="none"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="#111" font-size="16">
    <text x="45" y="15">C</text>
    <text x="0" y="188">0,80</text>
    <text x="0" y="143">0,90</text>
    <text x="0" y="52">0,98</text>
    <text x="0" y="20">1,00</text>
    <text x="142" y="228">D</text>
    <text x="198" y="228">m, г/м²</text>
    <text x="148" y="80">a</text>
    <text x="107" y="252">Черт. 2</text>
  </g>
</svg>
