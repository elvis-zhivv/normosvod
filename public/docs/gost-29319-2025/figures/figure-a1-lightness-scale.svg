<svg viewBox="0 0 820 230" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">Рисунок А.1 — Шкала изменения светлоты</title>
  <desc id="desc">Градиентная шкала изменения светлоты от черного к белому с делениями от 0 до 100.</desc>
  <defs>
    <linearGradient id="grayScaleA1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000"/>
