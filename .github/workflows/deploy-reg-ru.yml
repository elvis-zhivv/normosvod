name: Deploy to Reg.ru

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: reg-ru-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REG_HOST: ${{ secrets.REG_HOST }}
      REG_PORT: ${{ secrets.REG_PORT }}
      REG_USER: ${{ secrets.REG_USER }}
      REG_REMOTE_PATH: ${{ secrets.REG_REMOTE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site for root domain
        run: npm run build:reg

      - name: Validate deploy settings
        run: |
          test -n "$REG_HOST"
          test -n "$REG_PORT"
          test -n "$REG_USER"
          test -n "$REG_REMOTE_PATH"
          test -n "${{ secrets.REG_SSH_KEY }}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.REG_SSH_KEY }}" > ~/.ssh/reg_ru_key
          chmod 600 ~/.ssh/reg_ru_key
          ssh-keyscan -p "$REG_PORT" "$REG_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh -i ~/.ssh/reg_ru_key -p "$REG_PORT" "$REG_USER@$REG_HOST" "mkdir -p '$REG_REMOTE_PATH'"

      - name: Upload site
        run: |
          scp -i ~/.ssh/reg_ru_key -P "$REG_PORT" -r \
            dist/assets \
            dist/data \
            dist/docs \
            dist/index.html \
            dist/404.html \
            dist/.htaccess \
            "$REG_USER@$REG_HOST:$REG_REMOTE_PATH"

      - name: Fix permissions
        run: |
          ssh -i ~/.ssh/reg_ru_key -p "$REG_PORT" "$REG_USER@$REG_HOST" \
            "find '$REG_REMOTE_PATH' -type d -exec chmod 755 {} \; && find '$REG_REMOTE_PATH' -type f -exec chmod 644 {} \;"
