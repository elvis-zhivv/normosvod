  <g stroke="#8c8c8c" stroke-width="2" fill="none" shape-rendering="crispEdges">
    <line x1="22" y1="120" x2="798" y2="120"/>
    <line x1="22" y1="120" x2="22" y2="130"/>
    <line x1="100" y1="120" x2="100" y2="130"/>
    <line x1="177.2" y1="120" x2="177.2" y2="130"/>
    <line x1="254.4" y1="120" x2="254.4" y2="130"/>
    <line x1="331.6" y1="120" x2="331.6" y2="130"/>
    <line x1="408.8" y1="120" x2="408.8" y2="130"/>
    <line x1="486" y1="120" x2="486" y2="130"/>
    <line x1="563.2" y1="120" x2="563.2" y2="130"/>
