      <stop offset="50%" stop-color="#9f9f9f"/>
      <stop offset="78%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#f2f2f2"/>
    </linearGradient>
  </defs>

  <g font-family="Arial, Helvetica, sans-serif" fill="#111">
    <text x="46" y="18" font-size="18" font-weight="700">Черные</text>
    <text x="340" y="18" font-size="18" font-weight="700">Серые</text>
    <text x="680" y="18" font-size="18" font-weight="700">Белые</text>
  </g>

